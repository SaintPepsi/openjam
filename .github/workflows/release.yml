# Publishes the extension to the Chrome Web Store and Edge Add-ons on a
# version tag — no store dashboards involved after the first manual listing.
#
# Uses PlasmoHQ/bpp (https://github.com/PlasmoHQ/bpp). One repo secret,
# SUBMIT_KEYS, holds the per-store credentials JSON; generate it with
# https://github.com/PlasmoHQ/bms#submit-keysjson — Chrome needs
# clientId/clientSecret/refreshToken (Google Cloud OAuth for the
# Chrome Web Store API, https://developer.chrome.com/docs/webstore/using-api)
# and Edge needs productId/clientId/apiKey (Partner Center,
# https://learn.microsoft.com/en-us/microsoft-edge/extensions/publish/api/using-addons-api).
#
#   git tag v0.3.0 && git push --tags
name: Release to stores

on:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: lts/*
      - run: npm ci
      - run: npm run package
      - name: Publish to Chrome Web Store + Edge Add-ons
        uses: PlasmoHQ/bpp@v3
        with:
          keys: ${{ secrets.SUBMIT_KEYS }}
          chrome-file: openjam.zip
          edge-file: openjam.zip
