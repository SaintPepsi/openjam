# Tag-driven release, like the big packages: push a v* tag and this builds
# the zip, publishes a GitHub Release with auto-generated "What's Changed"
# notes (categorized per .github/release.yml,
# https://docs.github.com/en/repositories/releasing-projects-on-github/automatically-generated-release-notes),
# and — once the SUBMIT_KEYS secret exists — publishes to the Chrome Web
# Store + Edge Add-ons via https://github.com/PlasmoHQ/bpp.
#
# Release flow: bump version in manifest.json + package.json (PR), then
#   git tag v0.3.0 && git push --tags
#
# Store credentials (one-time, see issue #6): keys JSON format
# https://github.com/PlasmoHQ/bms#submit-keysjson — Chrome
# clientId/clientSecret/refreshToken
# (https://developer.chrome.com/docs/webstore/using-api), Edge
# productId/clientId/apiKey
# (https://learn.microsoft.com/en-us/microsoft-edge/extensions/publish/api/using-addons-api).
name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      SUBMIT_KEYS: ${{ secrets.SUBMIT_KEYS }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: lts/*
      - run: npm ci
      - run: npm run package
      - name: GitHub release with generated notes
        uses: softprops/action-gh-release@v2
        with:
          files: openjam.zip
          generate_release_notes: true
      - name: Publish to Chrome Web Store + Edge Add-ons
        if: env.SUBMIT_KEYS != ''
        uses: PlasmoHQ/bpp@v3
        with:
          keys: ${{ secrets.SUBMIT_KEYS }}
          chrome-file: openjam.zip
          edge-file: openjam.zip
