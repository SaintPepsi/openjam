# Unit (bun) + end-to-end (Playwright, real extension loaded headless — the
# chromium channel runs extensions in new headless mode, no xvfb needed:
# https://playwright.dev/docs/chrome-extensions).
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    # Run in the pinned Playwright image (browsers preinstalled). toHaveScreenshot
    # baselines are Linux-rendered in this exact image (npm run test:snapshots),
    # so comparing here is deterministic — no cross-OS font-rendering flake.
    container: mcr.microsoft.com/playwright:v1.60.0-jammy
    steps:
      - uses: actions/checkout@v5
      # The Playwright image ships without unzip (setup-bun needs it) or zip
      # (the package step needs it).
      - run: apt-get update && apt-get install -y --no-install-recommends unzip zip
      - uses: oven-sh/setup-bun@v2
      - run: npm ci
      # `npm test` builds, runs the bun unit suite, then the Playwright e2e
      # suite. CI=true (set by Actions) enables snapshot comparison.
      - run: npm test
      # Build the installable package, then upload its *contents* (not the .zip).
      # GitHub always re-zips an artifact, so uploading openjam.zip would yield a
      # zip-inside-a-zip — the Chrome Web Store then rejects it ("No manifest
      # found … put manifest.json at the root"), and macOS auto-unwraps both
      # layers so you can't even fish the inner zip out. Uploading the unpacked
      # files makes GitHub's single wrap land manifest.json at the zip root:
      # download from Checks -> this run -> Artifacts and upload straight to CWS
      # (or unzip and Load unpacked). upload-artifact strips the common parent
      # dir (pkg/), so the archive root is the extension itself.
      - run: npm run package && mkdir -p pkg && unzip -q openjam.zip -d pkg
      - uses: actions/upload-artifact@v4
        with:
          name: openjam-extension-${{ github.sha }}
          path: pkg/
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-failure-context
          path: test-results/
