# Unit (bun) + end-to-end (Playwright, real extension loaded headless — the
# chromium channel runs extensions in new headless mode, no xvfb needed:
# https://playwright.dev/docs/chrome-extensions).
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    # Run in the pinned Playwright image (browsers preinstalled). toHaveScreenshot
    # baselines are Linux-rendered in this exact image (npm run test:snapshots),
    # so comparing here is deterministic — no cross-OS font-rendering flake.
    container: mcr.microsoft.com/playwright:v1.60.0-jammy
    steps:
      - uses: actions/checkout@v5
      # The Playwright image ships without unzip (setup-bun needs it) or zip
      # (the package step needs it).
      - run: apt-get update && apt-get install -y --no-install-recommends unzip zip
      - uses: oven-sh/setup-bun@v2
      - run: npm ci
      # `npm test` builds, runs the bun unit suite, then the Playwright e2e
      # suite. CI=true (set by Actions) enables snapshot comparison.
      - run: npm test
      # Build the installable zip and attach it to the run so reviewers can
      # download and load it (Checks tab -> this run -> Artifacts) instead of
      # pulling the branch. GitHub re-wraps it, so the download is a zip that
      # contains openjam.zip; expires after the retention window.
      - run: npm run package
      - uses: actions/upload-artifact@v4
        with:
          name: openjam-extension-${{ github.sha }}
          path: openjam.zip
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-failure-context
          path: test-results/
