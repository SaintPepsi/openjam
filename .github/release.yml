# Categorizes auto-generated release notes by PR label
# (https://docs.github.com/en/repositories/releasing-projects-on-github/automatically-generated-release-notes).
changelog:
  categories:
    - title: ✨ Features
      labels: [enhancement]
    - title: 🐛 Fixes
      labels: [bug]
    - title: 📝 Docs
      labels: [documentation]
    - title: Other changes
      labels: ["*"]
