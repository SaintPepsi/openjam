<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>OpenJam E2E Fixture</title>
<style>
  body { font-family: sans-serif; margin: 40px; background: #fdf6e3; color: #333; }
  h1 { color: #b58900; }
  .card { background: #fff; border: 2px solid #268bd2; border-radius: 8px; padding: 16px; margin: 12px 0; max-width: 480px; }
  #counter { font-size: 32px; font-weight: bold; color: #dc322f; }
  button { background: #268bd2; color: #fff; border: 0; padding: 10px 18px; border-radius: 6px; font-size: 15px; cursor: pointer; }
  .tall { height: 600px; background: linear-gradient(#eee8d5, #93a1a1); margin-top: 20px; padding: 10px; }
</style>
<!-- A persistent, initially-empty stylesheet. It is snapshotted empty when
     recording starts; #injectStyle later adds a rule into THIS existing sheet
     (no DOM mutation), which rrweb can only observe via its insertRule patch —
     i.e. only from the MAIN world. This is the isolated-world regression guard. -->
<style id="dynsheet"></style>
</head>
<body>
  <h1>OpenJam E2E Fixture</h1>
  <div class="card">
    <p>Deterministic page for replay verification.</p>
    <label>Name: <input id="name" type="text" placeholder="type here"></label>
    <label>Secret: <input id="secret" type="password" placeholder="password"></label>
  </div>
  <div class="card">
    <div id="counter">0</div>
    <button id="inc">Increment</button>
    <button id="fetchBtn">Fetch self</button>
  </div>
  <!-- #cssinjs has NO static style; #injectStyle styles it at runtime via
       CSSStyleSheet.insertRule, the way Emotion/styled-components do (the
       <style> tag's text stays empty — the rule lives only in the CSSOM). The
       recorder only captures it from the MAIN world, so this is the regression
       guard for the isolated-world styling bug. -->
  <div class="card">
    <div id="cssinjs">Runtime-styled via insertRule</div>
    <button id="injectStyle">Inject style</button>
  </div>
  <div class="card">
    <button id="errBtn">Trigger error</button>
  </div>
  <div class="tall">Scroll target — bottom of the page.</div>
  <script>
    let n = 0;
    document.getElementById("inc").addEventListener("click", () => {
      n += 1;
      document.getElementById("counter").textContent = String(n);
      console.log("counter is now", n);
    });
    // Deterministic network traffic for e2e: re-fetch this very page.
    document.getElementById("fetchBtn").addEventListener("click", () => {
      fetch(location.href).then((r) => console.log("fetched self:", r.status));
    });
    // CSS-in-JS at runtime: insert a rule into the pre-existing #dynsheet
    // stylesheet (Emotion's "speedy" mode — the <style> stays in the DOM, its
    // text stays empty, the rule lives only in the CSSOM). No DOM mutation, so
    // rrweb can only capture this via its insertRule patch (MAIN world only).
    document.getElementById("injectStyle").addEventListener("click", () => {
      document
        .getElementById("dynsheet")
        .sheet.insertRule("#cssinjs{background:rgb(42,161,152);color:#fff;padding:18px}", 0);
      console.log("style injected");
    });
    // Uncaught error → Runtime.exceptionThrown (+ auto-screenshot) for the error lane.
    document.getElementById("errBtn").addEventListener("click", () => {
      throw new Error("fixture test error");
    });
  </script>
</body>
</html>
